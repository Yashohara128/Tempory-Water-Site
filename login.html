<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aqualife Water Filter Suppliers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="login.css">
</head>
<body class="d-flex align-items-center justify-content-center">

    <div class="lang-selector-top">
        <div class="btn-group" role="group">
            <button type="button" class="btn btn-sm btn-light active" id="btn-en">EN</button>
            <button type="button" class="btn btn-sm btn-light" id="btn-si">සිංහල</button>
        </div>
    </div>

    <div class="login-container text-center">
        
        <div class="logo-wrapper mx-auto mb-4">
            <img src="Aqualife logo.jpeg" alt="Aqualife Logo" class="logo-img">
        </div>

        <div id="authBox">
            
            <div id="loginSection">
                <form id="loginForm">
                    <div class="mb-3">
                        <input type="text" class="form-control form-control-lg text-center" id="username" placeholder="User Name / Email" required>
                    </div>
                    
                    <div class="mb-3">
                        <input type="password" class="form-control form-control-lg text-center" id="password" placeholder="Password" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-lg w-100 mb-3 fw-bold" id="btn-login" data-i18n="btn_login">Loging</button>
                </form>

                <button type="button" class="btn btn-custom-gray w-100 mb-2 fw-semibold" id="btn-create" data-i18n="btn_create">
                    Create a new account
                </button>

                <button type="button" class="btn btn-link btn-sm w-100 text-decoration-none mt-2 text-secondary" id="btn-forgot-link" data-i18n="btn_forgot">
                    Forget user password
                </button>
            </div>


            <div id="signupSection" class="d-none text-start mt-3">
                <h5 class="fw-bold text-center mb-3 text-dark" id="txt-signup-title">Create New Account</h5>
                <form id="signupForm">
                    <div class="mb-2">
                        <input type="text" class="form-control form-control-lg text-center" id="regUser" placeholder="Enter User Name" required>
                    </div>
                    <div class="mb-2">
                        <input type="email" class="form-control form-control-lg text-center" id="regGmail" placeholder="Enter valid Gmail address" required>
                    </div>
                    <div class="mb-2">
                        <input type="password" class="form-control form-control-lg text-center" id="regPass" placeholder="Enter password" minlength="6" required>
                    </div>
                    <div class="mb-3">
                        <input type="password" class="form-control form-control-lg text-center" id="regConfirmPass" placeholder="Confirm your password" required>
                    </div>
                    <button type="submit" class="btn btn-success btn-lg w-100 mb-2 fw-bold" id="btn-register-submit">Register</button>
                    <button type="button" class="btn btn-link btn-sm w-100 text-center text-decoration-none text-secondary" id="btn-signup-back" data-i18n="btn_back">Back to Login</button>
                </form>
            </div>


            <div id="forgotSection" class="d-none mt-3">
                <h5 class="fw-bold text-dark mb-3" id="txt-forgot-title">Reset Password</h5>
                <p class="text-muted small mb-3" id="txt-forgot-desc">Enter your registered email address to receive an OTP code.</p>
                <form id="forgotForm">
                    <div class="mb-3">
                        <input type="email" class="form-control form-control-lg text-center" id="forgotEmail" placeholder="Enter your registered Gmail" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-2 fw-bold" id="btn-send-code">Send OTP Code</button>
                    <button type="button" class="btn btn-link btn-sm w-100 text-decoration-none text-secondary" id="btn-forgot-back" data-i18n="btn_back">Back to Login</button>
                </form>
            </div>


            <div id="otpSection" class="d-none mt-3">
                <h5 class="fw-bold text-dark mb-3" id="txt-otp-title">Enter OTP Code</h5>
                <p class="text-muted small mb-3" id="txt-otp-desc">We have generated OTP for your email. Check your alerts!</p>
                <form id="otpForm">
                    <div class="mb-3">
                        <input type="text" class="form-control form-control-lg text-center fw-bold letter-spacing-2" id="otpInput" placeholder="Enter 4-Digit OTP" maxlength="4" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100 mb-2 fw-bold" id="btn-verify-otp">Verify & Show Password</button>
                    <button type="button" class="btn btn-link btn-sm w-100 text-decoration-none text-secondary" id="btn-otp-back" data-i18n="btn_back">Back to Login</button>
                </form>
            </div>

        </div> </div> <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="login.js"></script>
</body>
</html>
